<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Ground of Reach — gioco di carte didattico sulle fondamenta delle reti IPv4 (MOD 1.1, Bononi): binario, maschere, subnetting, NAT. Specchio di Root of Trust.">
<title>GROUND OF REACH — galleria</title>
<style>
  :root{
    --bg:#0b1020; --panel:#121a30; --panel2:#0e1528; --ink:#e8eefc; --mut:#8da2c8;
    --line:#22304f; --acc:#39d0c8; --acc2:#6aa9ff;
    --net:#39d0c8; --host:#ffce5a; --edge:#ff7a8a;
    --b:#7ee0d6; --a:#9ab6ff; --r:#ffb0bd;
    --radius:14px; --mono:ui-monospace,"Cascadia Code",Consolas,monospace;
    --sans:system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 80% -10%,#16224080,transparent),var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5}
  a{color:var(--acc2);text-decoration:none}
  a:hover{text-decoration:underline}
  header{padding:28px 20px 10px;max-width:1180px;margin:0 auto}
  .brand{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  h1{font-size:1.7rem;margin:0;letter-spacing:.06em}
  .sub{color:var(--mut);font-size:.95rem}
  .meta{color:var(--mut);font-size:.85rem;margin-top:8px;max-width:760px}
  .meta b{color:var(--ink)}
  nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  nav a,.chip{background:var(--panel);border:1px solid var(--line);padding:7px 12px;border-radius:999px;color:var(--ink);font-size:.85rem;cursor:pointer}
  nav a:hover{border-color:var(--acc)}
  .search{position:relative;margin-top:16px;max-width:520px}
  .search input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);font-size:1rem}
  .ac{position:absolute;z-index:30;left:0;right:0;top:52px;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:none}
  .ac div{padding:9px 14px;cursor:pointer;font-size:.9rem;display:flex;justify-content:space-between;gap:10px}
  .ac div:hover,.ac .on{background:#1b2746}
  .ac .k{color:var(--mut);font-family:var(--mono);font-size:.78rem}
  main{max-width:1180px;margin:0 auto;padding:10px 20px 80px}
  section.cls{margin-top:30px}
  .cls h2{font-size:1.02rem;letter-spacing:.12em;color:var(--acc);border-bottom:1px solid var(--line);padding-bottom:8px;display:flex;justify-content:space-between;align-items:baseline}
  .cls h2 small{color:var(--mut);font-weight:400;letter-spacing:0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:14px;margin-top:14px}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:var(--radius);padding:14px;cursor:pointer;transition:.12s;position:relative;overflow:hidden}
  .card:hover{transform:translateY(-3px);border-color:var(--acc)}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--fac)}
  .card.net{--fac:var(--net)} .card.host{--fac:var(--host)} .card.edge{--fac:var(--edge)}
  .card .top{display:flex;justify-content:space-between;align-items:start;gap:8px}
  .card .nm{font-weight:650;font-size:1.02rem}
  .card .cost{font-family:var(--mono);font-size:.8rem;color:var(--bg);background:var(--fac);border-radius:7px;padding:2px 7px;white-space:nowrap}
  .card .ty{color:var(--mut);font-size:.76rem;margin-top:2px}
  .card .rel{font-size:.84rem;margin-top:10px;color:#cdd8f2;min-height:34px}
  .card .req{font-size:.78rem;margin-top:8px;color:#ffb0bd;border-left:2px solid var(--edge);padding-left:7px}
  .card .req a{color:#ffd0d8}
  .card .kw{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
  .tag{font-family:var(--mono);font-size:.7rem;padding:2px 6px;border-radius:6px;border:1px solid var(--line);color:var(--mut)}
  .tag.b{color:var(--b)} .tag.a{color:var(--a)} .tag.r{color:var(--r)}
  .tag.st{color:#cdb4ff;border-color:#5b4b8a}
  a[data-st]{text-decoration:none}
  .kwcat{margin:18px 0 2px;font-size:.8rem}
  .kwcat .tag{font-size:.72rem;letter-spacing:.06em}
  .ref{position:absolute;left:0;right:0;top:0;bottom:0}
  /* glossary */
  #glossary .grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
  .kwcard{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;cursor:pointer}
  .kwcard:hover{border-color:var(--acc)}
  .kwcard .kn{font-family:var(--mono);font-weight:700}
  .kwcard .kd{font-size:.82rem;color:var(--mut);margin-top:6px}
  /* overlay windows */
  #ov{position:fixed;inset:0;pointer-events:none;z-index:50}
  .win{position:absolute;width:min(420px,92vw);background:var(--panel);border:1px solid var(--acc);border-radius:14px;box-shadow:0 18px 50px #000a;pointer-events:auto;overflow:hidden}
  .win .h{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:#16203c;border-bottom:1px solid var(--line);cursor:move}
  .win .h b{font-size:1rem}
  .win .h .x{cursor:pointer;color:var(--mut);font-size:1.1rem;padding:0 4px}
  .win .h .x:hover{color:var(--acc)}
  .win .bd{padding:14px;max-height:60vh;overflow:auto}
  .win .lbl{font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;color:var(--acc);text-transform:uppercase}
  .win p{margin:4px 0 14px}
  .win .cmd{font-family:var(--mono);font-size:.82rem;background:#0a1124;border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--b);white-space:pre-wrap}
  .win .lk{margin-top:10px;font-size:.82rem}
  footer{max-width:1180px;margin:0 auto;padding:0 20px 50px;color:var(--mut);font-size:.8rem}
  mark{background:#39d0c855;color:inherit;border-radius:3px}

  /* ---- stampa: galleria pulita, ink-friendly ---- */
  @media print{
    body{background:#fff;color:#111}
    .search,nav,#ov,#ac{display:none !important}
    header{padding:0 0 8px;max-width:none}
    .meta{color:#333}
    main{max-width:none;padding:0}
    a{color:#111;text-decoration:none}
    section.cls{margin-top:14px;break-inside:auto}
    .cls h2{color:#111;border-color:#999;break-after:avoid;font-size:1rem}
    .cls h2 small{color:#555}
    .grid{grid-template-columns:repeat(3,1fr);gap:8px}
    #glossary .grid{grid-template-columns:repeat(3,1fr)}
    .card,.kwcard{break-inside:avoid;page-break-inside:avoid;box-shadow:none;transform:none !important;
      background:#fff;border:1px solid #999}
    .card .rel,.card .ty{color:#222}
    .card .req{color:#333;border-color:#999}
    .card .cost{background:#fff;color:#111;border:1px solid #111}
    .card::before,.tag.b,.tag.a,.tag.r{ -webkit-print-color-adjust:exact;print-color-adjust:exact }
    .tag{border-color:#999;color:#333}
    .kwcard .kd{color:#333}
    footer{color:#444;font-size:.72rem}
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1 id="t"></h1><span class="sub" id="st"></span>
  </div>
  <div class="meta" id="mt"></div>
  <nav>
    <a href="#cards">Carte</a>
    <a href="#glossary">Glossario</a>
    <a href="compendio.html">Compendio ▸</a>
    <a href="diagramma.html">Diagrammi ▸</a>
    <a href="applicazioni.html">Applicazioni ▸</a>
    <span class="chip" id="mod"></span>
  </nav>
  <div class="search">
    <input id="q" placeholder="Cerca carta o keyword…  (es. netmask, AND, VLSM)" autocomplete="off">
    <div class="ac" id="ac"></div>
  </div>
</header>

<main>
  <div id="cards"></div>
  <section class="cls" id="glossary">
    <h2>GLOSSARIO KEYWORD <small>la meccanica È l'operazione reale</small></h2>
    <div class="grid" id="kwgrid"></div>
  </section>
</main>

<footer id="ft"></footer>
<div id="ov"></div>

<script src="data.js"></script>
<script>
(function(){
  const $=s=>document.querySelector(s), el=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
  const KWTYPE={b:"b",a:"a",r:"r"};
  const kwType=n=>{const k=KW.find(x=>x[0]===n);return k?k[1]:"a";};

  $("#t").textContent=META.title;
  $("#st").textContent=META.subtitle;
  $("#mt").innerHTML="<b>Specchio «al contrario» di Root of Trust.</b> "+META.mirror;
  $("#mod").textContent=META.module+" · "+META.version;
  $("#ft").innerHTML="Badge costo (alto a destra della carta): <b>N bit</b> = bit dell'indirizzo fissati (su 32); <b>+s</b> / <b>h</b> = bit variabili del subnetting; <b>⊕</b> = effetto/regola.<br>Regola d'oro: ogni carta e ogni legenda è <b>fedele alle reti IPv4 reali</b>; la meccanica coincide con l'operazione. — "+META.module;

  /* ---- render cards by class ---- */
  const host=$("#cards");
  CLS_ORDER.forEach(cls=>{
    const list=CARDS.filter(c=>c.cls===cls); if(!list.length)return;
    const sec=el("section","cls");
    sec.innerHTML=`<h2>${cls} <small>${CLS[cls]||""}</small></h2>`;
    const g=el("div","grid");
    list.forEach(c=>g.appendChild(cardEl(c)));
    sec.appendChild(g); host.appendChild(sec);
  });

  function cardEl(c){
    const d=el("div","card "+c.fac); d.dataset.name=c.n;
    const kw=c.kw.map(k=>`<span class="tag ${kwType(k)}">${k}</span>`).join("");
    d.innerHTML=`<div class="top"><div><div class="nm">${c.n}</div><div class="ty">${c.ty}</div></div>
      <div class="cost" title="${costTitle(c.cost)}">${c.cost==="S"?"⊕":c.cost+" bit"}</div></div>
      <div class="rel">${linkRel(c.rel)}</div>${c.req?`<div class="req">⚑ Richiede: ${linkRel(c.req)}</div>`:""}<div class="kw">${kw}</div>`;
    d.addEventListener("click",e=>{ if(e.target.closest("[data-card]"))return; openCard(c.n); });
    return d;
  }
  function linkRel(t){ return t.replace(/\[([^\]]+)\]/g,(m,n)=>{
    if(CARDS.some(c=>c.n===n)) return `<a data-card="${n}" href="#">${n}</a>`;
    const k=KW.find(x=>x[0].toLowerCase()===n.toLowerCase());
    if(k) return `<a data-kw="${k[0]}" href="#">${n}</a>`;
    return n; // né carta né keyword → testo semplice (niente link morti)
  }); }
  function costTitle(c){
    if(c==="S")return "Effetto/regola — nessun costo fisso in bit";
    if(c==="+s")return "Subnetting: prende in prestito s host-bit (allunga il prefisso)";
    if(c==="h")return "h = 32 − prefisso: bit di host del blocco (host utili = 2^h − 2)";
    return "Bit dell'indirizzo fissati da questa carta (su 32 totali)";
  }

  /* ---- glossary: keyword raggruppate per categoria (metodologia StS) ---- */
  const gloss=$("#glossary"); $("#kwgrid").remove();
  ["b","a","r"].forEach(cat=>{
    const list=KW.filter(k=>k[1]===cat); if(!list.length)return;
    const head=el("div","kwcat"); head.innerHTML=`<span class="tag ${cat}">${(typeof KWCAT!=="undefined"&&KWCAT[cat])||cat}</span>`;
    gloss.appendChild(head);
    const g=el("div","grid");
    list.forEach(([n,ty,desc])=>{
      const d=el("div","kwcard");
      d.innerHTML=`<div class="kn"><span class="tag ${ty}">${n}</span></div><div class="kd">${desc}</div>`;
      d.addEventListener("click",()=>openKw(n));
      g.appendChild(d);
    });
    gloss.appendChild(g);
  });

  /* ---- overlay windows (click-to-pin, independent) ---- */
  const ov=$("#ov"); let zc=60, off=0;
  function win(title,html){
    const w=el("div","win"); w.style.zIndex=++zc;
    const x=20+(off%6)*26, y=70+(off%6)*26; off++;
    w.style.left=Math.min(x,window.innerWidth-440)+"px"; w.style.top=y+"px";
    w.innerHTML=`<div class="h"><b>${title}</b><span class="x">✕</span></div><div class="bd">${html}</div>`;
    w.querySelector(".x").onclick=()=>w.remove();
    w.addEventListener("mousedown",()=>w.style.zIndex=++zc);
    drag(w,w.querySelector(".h"));
    w.querySelectorAll("[data-card]").forEach(a=>a.onclick=e=>{e.preventDefault();openCard(a.dataset.card);});
    w.querySelectorAll("[data-kw]").forEach(a=>a.onclick=e=>{e.preventDefault();openKw(a.dataset.kw);});
    w.querySelectorAll("[data-st]").forEach(a=>a.onclick=e=>{e.preventDefault();openSubtype(a.dataset.st);});
    ov.appendChild(w); return w;
  }
  function openCard(n){
    const c=CARDS.find(x=>x.n===n); if(!c)return;
    const i=INFO[n]||{}; const ref=TERM_REF[n];
    const kw=c.kw.map(k=>`<a data-kw="${k}" href="#"><span class="tag ${kwType(k)}">${k}</span></a>`).join(" ");
    const sts=c.ty.split("·").map(s=>s.trim()).filter(Boolean).map(s=>`<a data-st="${s}" href="#"><span class="tag st">${s}</span></a>`).join(" ");
    let h=`<div class="lbl">Classe ${c.cls} · ${FAC[c.fac].label} · ${c.cost==="S"?"⊕":c.cost+" bit"}</div><p>${linkRel(c.rel)}</p>`;
    h+=`<div class="lbl">Sottotipi</div><p>${sts}</p>`;
    if(c.req){h+=`<div class="lbl">⚑ Requisito (prerequisito reale)</div><p>${linkRel(c.req)}</p>`;}
    if(i.r){h+=`<div class="lbl">Cos'è davvero (reti IPv4)</div><p>${linkRel(i.r)}</p>`;}
    if(i.g){h+=`<div class="lbl">Nel gioco</div><p>${linkRel(i.g)}</p>`;}
    if(i.c){h+=`<div class="lbl">Calcolo / comando</div><div class="cmd">${i.c}</div>`;}
    h+=`<div class="lbl" style="margin-top:14px">Keyword</div><p>${kw}</p>`;
    if(ref)h+=`<div class="lk">▸ <a href="compendio.html#r${ref}">Compendio §${ref}</a></div>`;
    const ex=(typeof EX_REF!=="undefined")&&EX_REF[n];
    if(ex)h+=`<div class="lk">▸ <a href="compendio.html#r${ex}">Esercizio svolto §${ex}</a></div>`;
    win(n,h);
  }
  function openKw(n){
    const info=KW_INFO[n]||{}; const ref=KW_REF[n]; const ty=kwType(n);
    const used=CARDS.filter(c=>c.kw.includes(n)).map(c=>`<a data-card="${c.n}" href="#">${c.n}</a>`).join(", ")||"—";
    let h=`<div class="lbl">Keyword <span class="tag ${ty}">${n}</span></div>`;
    if(info.r){h+=`<div class="lbl">Reale</div><p>${info.r}</p>`;}
    if(info.g){h+=`<div class="lbl">Nel gioco</div><p>${info.g}</p>`;}
    h+=`<div class="lbl">Usata da</div><p>${used}</p>`;
    if(ref)h+=`<div class="lk">▸ <a href="compendio.html#r${ref}">Compendio §${ref}</a></div>`;
    win("KW · "+n,h);
  }
  function openSubtype(s){
    const def=(typeof SUBTYPES!=="undefined"&&SUBTYPES[s])||"";
    const used=CARDS.filter(c=>c.ty.split("·").map(x=>x.trim()).includes(s)).map(c=>`<a data-card="${c.n}" href="#">${c.n}</a>`).join(", ")||"—";
    let h=`<div class="lbl">Sottotipo <span class="tag st">${s}</span></div>`;
    if(def)h+=`<p>${def}</p>`;
    h+=`<div class="lbl">Carte con questo sottotipo</div><p>${used}</p>`;
    win("Sottotipo · "+s,h);
  }
  function drag(w,handle){
    let sx,sy,ox,oy,on=false;
    handle.addEventListener("mousedown",e=>{if(e.target.classList.contains("x"))return;on=true;sx=e.clientX;sy=e.clientY;ox=w.offsetLeft;oy=w.offsetTop;e.preventDefault();});
    window.addEventListener("mousemove",e=>{if(!on)return;w.style.left=(ox+e.clientX-sx)+"px";w.style.top=(oy+e.clientY-sy)+"px";});
    window.addEventListener("mouseup",()=>on=false);
  }

  /* ---- search + autocomplete ---- */
  const q=$("#q"), ac=$("#ac"); let idx=-1, items=[];
  const POOL=[...CARDS.map(c=>({t:c.n,k:c.cls,kind:"card"})),...KW.map(k=>({t:k[0],k:"keyword",kind:"kw"}))];
  q.addEventListener("input",()=>{
    const v=q.value.trim().toLowerCase(); idx=-1;
    if(!v){ac.style.display="none";return;}
    items=POOL.filter(p=>p.t.toLowerCase().includes(v)).slice(0,8);
    ac.innerHTML=items.map((p,j)=>`<div data-j="${j}"><span>${p.t}</span><span class="k">${p.k}</span></div>`).join("");
    ac.style.display=items.length?"block":"none";
    ac.querySelectorAll("div").forEach(d=>d.onclick=()=>pick(items[+d.dataset.j]));
  });
  q.addEventListener("keydown",e=>{
    if(ac.style.display==="none")return;
    if(e.key==="ArrowDown"){idx=(idx+1)%items.length;hi();e.preventDefault();}
    else if(e.key==="ArrowUp"){idx=(idx-1+items.length)%items.length;hi();e.preventDefault();}
    else if(e.key==="Enter"){if(items[idx]||items[0])pick(items[idx]||items[0]);}
    else if(e.key==="Escape")ac.style.display="none";
  });
  function hi(){ac.querySelectorAll("div").forEach((d,j)=>d.classList.toggle("on",j===idx));}
  function pick(p){ ac.style.display="none"; q.value=""; p.kind==="card"?openCard(p.t):openKw(p.t); }
  document.addEventListener("click",e=>{if(!e.target.closest(".search"))ac.style.display="none";});
})();
</script>
</body>
</html>
